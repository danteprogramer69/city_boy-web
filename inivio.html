<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surreal Vision Forum</title>
<style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00f2ff;
            --glass-bg: rgba(5, 5, 5, 0.75);
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
        }
        #bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1; 
            overflow: hidden;
            background-color: #000;
        }
        .bg-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 0.1s steps(2);
            transform: scale(1.1);
        }

        .bg-slide.active {
            opacity: 1;
            animation: 
                mangaImpact 0.4s cubic-bezier(0.1, 0.9, 0.2, 1) forwards, 
                freneticShake 0.1s infinite;
        }
        @keyframes mangaImpact {
            0% { transform: scale(1.7) rotate(4deg); filter: brightness(2.5) contrast(2); }
            100% { transform: scale(1.1) rotate(0deg); filter: brightness(1) contrast(1.2); }
        }
        @keyframes freneticShake {
            0% { transform: translate(0,0) scale(1.1); }
            25% { transform: translate(-10px, 6px) scale(1.12); }
            50% { transform: translate(10px, -6px) scale(1.1); }
            75% { transform: translate(-6px, -10px) scale(1.12); }
            100% { transform: translate(0,0) scale(1.1); }
        }
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.1); 
            z-index: 2; 
            pointer-events: none;
        }
        .main-wrapper {
            position: relative;
            z-index: 10; 
            max-width: 750px;
            margin: 60px auto;
            background: var(--glass-bg);
            backdrop-filter: blur(18px); 
            -webkit-backdrop-filter: blur(18px);
            border: 2px solid rgba(0, 242, 255, 0.3);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 0 50px rgba(0,0,0,0.4);
            animation: entryGlitch 0.5s ease-out;
        }
        @keyframes entryGlitch {
            0% { transform: scale(0.5) translateY(100px); opacity: 0; }
            20% { transform: scale(1.1) translateY(-20px); opacity: 0.8; }
            40% { transform: scale(0.9) translateY(10px); opacity: 1; filter: hue-rotate(90deg); }
            100% { transform: scale(1) translateY(0); filter: hue-rotate(0deg); }
        }
        h1 {
            text-align: center;
            font-size: 2.8em;
            letter-spacing: 12px;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-blue);
            animation: textFlicker 3s linear infinite;
            margin-bottom: 50px;
        }
        @keyframes textFlicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { text-shadow: 0 0 10px var(--neon-blue); }
            20%, 22%, 24%, 55% { text-shadow: none; color: #444; }
        }
        .post {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-left: 5px solid var(--neon-blue);
            padding: 25px;
            margin-bottom: 35px;
            border-radius: 8px;
            animation: postFrenzy 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55) both;
            transform-origin: top left;
        }
        @keyframes postFrenzy {
            0% { transform: rotateY(90deg) scale(0); opacity: 0; filter: blur(10px); }
            100% { transform: rotateY(0deg) scale(1); opacity: 1; }
        }
        .post-user {
            color: var(--neon-pink);
            font-weight: bold;
            font-size: 1.1em;
            display: block;
            margin-bottom: 12px;
            letter-spacing: 2px;
        }
        .post-text {
            line-height: 1.6;
            color: #eee;
            margin-bottom: 15px;
        }
        .post-image {
            width: 100%;
            border-radius: 8px;
            border: 2px solid #333;
            margin-top: 10px;
            display: block;
        }
.boton-aura {
    padding: 15px 35px;
    background: #000;
    color: #fff;
    border: 2px solid var(--neon-blue);
    font-family: 'Courier New', monospace;
    font-weight: bold;
    font-size: 1.2em;
    cursor: pointer;
    position: relative;
    transition: all 0.2s;
    text-shadow: 0 0 8px var(--neon-blue);
    z-index: 20;
    outline: none;
}
.boton-aura.activa-aura {
    background: var(--neon-blue);
    color: #fff;
    border-color: #fff;
    box-shadow: 
        0 0 20px #fff,
        0 0 40px var(--neon-blue),
        0 0 70px var(--neon-pink),
        0 0 120px rgba(0, 242, 255, 0.8);
    animation: auraFrenzy 0.1s infinite, lightningFlash 0.15s infinite;
}
@keyframes auraFrenzy {
    0% { transform: scale(1.1) translate(0, 0); }
    33% { transform: scale(1.15) translate(-5px, 3px) rotate(1deg); }
    66% { transform: scale(1.05) translate(5px, -3px) rotate(-1deg); }
    100% { transform: scale(1.1) translate(0, 0); }
}
@keyframes lightningFlash {
    0%, 100% { filter: brightness(1) contrast(1.2); }
    50% { 
        background: #fff; 
        box-shadow: 0 0 150px #fff, 0 0 300px var(--neon-blue);
        filter: brightness(2);
    }
}
.boton-aura:hover {
    filter: brightness(1.5);
    transform: scale(1.05);
}
    </style>
</head>
<body>
    <div id="bg-container">
        <div class="bg-slide active" style="background-image: url('hh.jpg')"></div>
        <div class="bg-slide" style="background-image: url('c.jpg')"></div>
        <div class="bg-slide" style="background-image: url('h.jpg')"></div>
        <div class="bg-slide" style="background-image: url('g.jpg')"></div>
        <div class="bg-slide" style="background-image: url('cv.jpg')"></div>
        <div class="bg-slide" style="background-image: url('d.jpg')"></div>

    </div>
    <div class="bg-overlay"></div>
    <div class="main-wrapper">
        <h1>|Six_seven_forum|</h1>
        <button id="btn-musica" class="boton-aura">FARMEO DE AURA</button>
        <audio id="miMusica" src="67 FUNK x CITY BOY FUNK.mp3" loop></audio>
        <div id="feed">
            <div class="post">
                <span class="post-user">@Sixeeven_funk</span>
                <p class="post-text">¡NO TE PASES DE CAMOTE!!!!</p>
                <img src="post.jpg" class="post-image">
                
                <span class="post-user">@Sixeeven_funk</span>
                <p class="post-text">¡NO TE PASES DE CAMOTE!!!!</p>
                <img src="fff.jpg" class="post-image">
                
                <span class="post-user">@Sixeeven_funk</span>
                <p class="post-text">¡NO TE PASES DE CAMOTE!!!!</p>
                <img src="dd.jpg" class="post-image">
            </div>
            </div>
    </div>
    <script>
        const slides = document.querySelectorAll('.bg-slide');
        let current = 0;
        function rotateBackground() {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }
        setInterval(rotateBackground, 3000);
        const boton = document.getElementById('btn-musica');
const botonMusica = document.getElementById('btn-musica');
const audioControl = document.getElementById('miMusica');

botonMusica.addEventListener('click', () => {
    if (audioControl.paused) {
        audioControl.play();
        botonMusica.classList.add('activa-aura');
        botonMusica.innerText = "AURA ACTIVA";
    } else {
        audioControl.pause();
        botonMusica.classList.remove('activa-aura');
        botonMusica.innerText = "REPRODUCIR";
    }
});

audioControl.onended = () => {
    botonMusica.classList.remove('activa-aura');
    botonMusica.innerText = "REPRODUCIR";
};
    </script>
</body>
</html>
